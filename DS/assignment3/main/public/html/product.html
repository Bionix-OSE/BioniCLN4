<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Product Details</h1>
    <div class="product">
        <div class="field"><span class="label">ID:</span> {{id}}</div>
        <div class="field"><span class="label">Name:</span> {{name}}</div>
        <div class="field"><span class="label">Origin:</span> {{origin}}</div>
        <div class="field"><span class="label">Farm:</span> {{farm}}</div>
        <div class="field"><span class="label">Website:</span> <a href="{{website}}" target="_blank">{{website}}</a></div>
        <div class="field"><span class="label">Energy:</span> {{energy}}</div>
        <div class="field"><span class="label">Expiry:</span> {{expiry}}</div>
    </div>
</body>
</html>
